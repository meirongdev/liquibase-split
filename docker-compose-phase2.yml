services:
  postgres-shared:
    image: postgres:16-alpine
    container_name: liquibase-split-phase2-db
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - phase2-postgres-data:/var/lib/postgresql/data
      - ./docker/phase2/init-schemas.sql:/docker-entrypoint-initdb.d/001-init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopdb"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  phase2-postgres-data:
